<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – Task Mate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>

  <div class="auth-page">
    <a href="/" class="auth-back">← Back to home</a>
    <div class="auth-card">
      <div class="auth-logo">Task<span>Mate</span></div>
      <p class="auth-subtitle">Welcome back. Log in to see your tasks.</p>

      <form method="post" novalidate>
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email Address</label>
          <input class="form-input" id="loginEmail" type="email" name="email" autocomplete="email">
          <div class="form-error">Enter the email you signed up with.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input class="form-input" id="loginPassword" type="password" name="name" autocomplete="current-password">
          <div class="form-error">Incorrect email or password.</div>
        </div>

        <button type="submit" class="btn-primary btn-block" style="padding:12px;">Log In</button>
      </form>

      <div class="auth-footer">Don't have an account? <a href="/signup">Sign up</a></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="static/js/app.js"></script>
</body>
</html>
