<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Task Mate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>

  <div class="auth-page">
    <a href="/" class="auth-back">← Back to home</a>
    <div class="auth-card">
      <div class="auth-logo">Task<span>Mate</span></div>
      <p class="auth-subtitle">Create your account to start organizing your day.</p>

      <form novalidate>
        {% csrf_token %}
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="Name">Name</label>
            <input class="form-input" id="Name" type="text" name="name" autocomplete="given-name">
            <div class="form-error">Please enter your first name.</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signupEmail">Email Address</label>
          <input class="form-input" id="signupEmail" type="email" name="email" autocomplete="email">
          <div class="form-error">Enter a valid email address.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="signupPassword">Password</label>
          <input class="form-input" id="signupPassword" type="password" name="password" autocomplete="new-password">
          <div class="form-error">Password must be at least 6 characters.</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input class="form-input" id="confirmPassword" type="password" name="confirm_password" autocomplete="new-password">
          <div class="form-error">Passwords do not match.</div>
        </div>

        <button type="submit" class="btn-primary btn-block" style="padding:12px;">Create Account</button>
      </form>

      <div class="auth-footer">Already have an account? <a href="/login">Log in</a></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="static/js/app.js"></script>
</body>
</html>
